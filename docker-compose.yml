services:

  fastapi-backend:
    container_name: smartrail-fastapi

    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    working_dir: /app

    restart: always

    command: >
      uvicorn app.run_api:app
      --host 0.0.0.0
      --port 8000


  streamlit-dashboard:
    container_name: smartrail-dashboard

    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "8501:8501"

    volumes:
      - .:/app

    working_dir: /app

    restart: always

    command: >
      streamlit run app/dashboard/dashboard.py
      --server.port 8501
      --server.address 0.0.0.0